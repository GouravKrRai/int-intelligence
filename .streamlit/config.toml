[theme]
base = "light"
primaryColor = "#222222"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8f8f6"
textColor = "#222222"
font = "serif"

[server]
headless = true

[browser]
gatherUsageStats = false

# disables developer keyboard shortcuts (C = clear caches, R = rerun, etc.)
# that fire even when the user is just trying to copy text with Cmd+C
[client]
toolbarMode = "viewer"
showErrorDetails = true
